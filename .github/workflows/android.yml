name: Build Kivy APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04 # Using a specific version for stability

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build with Buildozer
        # Using this version avoids the 'invalid user' permission bug
        uses: FaridSafi/buildozer-action@master
        with:
          command: buildozer android debug
          buildozer_version: stable

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kivy-app-debug
          # Buildozer typically puts the APK in the bin/ folder
          path: bin/*.apk
