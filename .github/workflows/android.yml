name: Build Kivy APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build with Buildozer
        # This specialized action handles the complex Android environment setup automatically
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          buildozer_version: stable
          command: buildozer android debug
          repository_root: .
          workdir: myapp  # Points to your subfolder containing main.py

      - name: Upload APK
        # Upgraded to v4 to resolve the deprecation error seen in your first log
        uses: actions/upload-artifact@v4
        with:
          name: kivy-apk
          path: myapp/bin/*.apk
